name: Upload Release Assets to R2

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  upload:
    # dist calls host jobs for pull requests too, but only tags publish releases.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    steps:
      - name: Fetch release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib
          merge-multiple: true
      - name: Upload artifacts to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TAG: ${{ github.ref_name }}
        run: |
          aws s3 sync target/distrib "s3://rpx-releases/rpx/${TAG}/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --cache-control 'public, max-age=31536000, immutable' \
            --no-progress
      - name: Update latest stable release pointer
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf '{"tag":"%s"}\n' "$TAG" > latest.json
            aws s3 cp latest.json 's3://rpx-releases/rpx/latest.json' \
              --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
              --content-type 'application/json' \
              --cache-control 'no-cache' \
              --no-progress
          fi
