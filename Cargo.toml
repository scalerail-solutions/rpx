[package]
name = "rpx"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
directories = "6.0.0"
indicatif = "0.17.11"
pubgrub = "0.3.0"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
r-description = "0.3.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
[dev-dependencies]
mockito = "1.7.0"
testcontainers = { version = "0.27.2", features = ["blocking"] }
